name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - name: Overview metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-overview.svg
          config_timezone: Asia/Shanghai
          config_display: small
          plugin_introduction: yes
          plugin_languages: no
          plugin_isocalendar: no
          plugin_followup: no
          plugin_repositories: no

      - name: Featured repositories metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-featured.svg
          config_timezone: Asia/Shanghai
          config_display: small
          base: ""
          plugin_repositories: yes
          plugin_repositories_pinned: 4
          plugin_languages: no
          plugin_isocalendar: no
          plugin_followup: no

      - name: Pull requests metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-pr.svg
          config_timezone: Asia/Shanghai
          config_display: small
          base: ""
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_languages: no
          plugin_isocalendar: no
          plugin_repositories: no

      - name: Languages metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-languages.svg
          config_timezone: Asia/Shanghai
          config_display: small
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, gnuplot
          plugin_languages_categories: programming
          plugin_languages_recent_categories: programming
          plugin_languages_recent_load: 300
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6
          plugin_isocalendar: no
          plugin_followup: no
          plugin_repositories: no

      - name: Contribution calendar metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-calendar.svg
          config_timezone: Asia/Shanghai
          config_display: small
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_followup: no
          plugin_languages: no
          plugin_repositories: no
